AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Big Brother Barber Shop - WhatsApp Chatbot

Globals:
  Function:
    Timeout: 15
    Runtime: nodejs20.x
    MemorySize: 128
    Environment:
      Variables:
        WHATSAPP_TOKEN: !Ref WhatsAppToken
        WHATSAPP_PHONE_NUMBER_ID: !Ref WhatsAppPhoneNumberId
        VERIFY_TOKEN: !Ref VerifyToken
        OWNER_PHONE: !Ref OwnerPhone
        APPOINTMENTS_TABLE: !Ref AppointmentsTable

Parameters:
  WhatsAppToken:
    Type: String
    Description: Meta WhatsApp Business API Token
    NoEcho: true
  WhatsAppPhoneNumberId:
    Type: String
    Description: WhatsApp Phone Number ID
  VerifyToken:
    Type: String
    Description: Custom webhook verification token
  OwnerPhone:
    Type: String
    Description: Owner phone number for notifications (e.g. 573001234567)
    Default: '573001234567'

Resources:
  # ---- API Gateway ----
  WhatsAppWebhookApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: BigBrotherWhatsAppAPI
      StageName: prod
      Description: Webhook endpoint for WhatsApp Cloud API

  # ---- Lambda Functions ----
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: BigBrother-WhatsApp-Webhook
      Handler: src/handlers/webhook.handler
      Description: Handles both GET (verify) and POST (messages) webhook requests
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppointmentsTable
      Events:
        WebhookVerify:
          Type: Api
          Properties:
            RestApiId: !Ref WhatsAppWebhookApi
            Path: /webhook
            Method: GET
        WebhookMessage:
          Type: Api
          Properties:
            RestApiId: !Ref WhatsAppWebhookApi
            Path: /webhook
            Method: POST

  # ---- DynamoDB Table ----
  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BigBrotherAppointments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

Outputs:
  WebhookUrl:
    Description: Webhook URL to configure in Meta Developer Portal
    Value: !Sub 'https://${WhatsAppWebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook'
  AppointmentsTableName:
    Description: DynamoDB table name for appointments
    Value: !Ref AppointmentsTable
